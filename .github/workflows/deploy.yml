name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
      DEPLOY_SERVICE_NAME: ${{ vars.DEPLOY_SERVICE_NAME }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY is required}"
          : "${DEPLOY_KNOWN_HOSTS:?DEPLOY_KNOWN_HOSTS is required}"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%b' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          printf '%b' "$DEPLOY_KNOWN_HOSTS" | tr -d '\r' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        run: |
          set -euo pipefail
          app_dir="${DEPLOY_APP_DIR:-/opt/discord-bot}"
          service_name="${DEPLOY_SERVICE_NAME:-discord-bot}"
          port="${DEPLOY_PORT:-22}"
          ssh -p "$port" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "sudo APP_DIR='$app_dir' SERVICE_NAME='$service_name' BRANCH='${GITHUB_REF_NAME}' bash '$app_dir/scripts/deploy.sh'"
